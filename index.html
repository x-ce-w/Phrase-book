<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xa's Phrase Book vol. 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #16233A;
    --navy-deep: #0E1728;
    --cream: #F4ECD8;
    --cream-dim: #E8DCBE;
    --brass: #C9A227;
    --brass-bright: #E0BB3E;
    --ink: #1B2A41;
    --it: #B23A2E;
    --fr: #2C5F8A;
    --es: #C98A1A;
    --line: rgba(244, 236, 216, 0.14);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--navy);
    background-image:
      radial-gradient(circle at 15% 8%, rgba(201,162,39,0.07), transparent 40%),
      radial-gradient(circle at 90% 85%, rgba(44,95,138,0.10), transparent 45%);
    color: var(--cream);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  header {
    padding: 48px 24px 28px;
    text-align: center;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, var(--navy-deep), transparent);
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--brass-bright);
    margin-bottom: 14px;
  }

  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    font-size: 0.7rem;
    letter-spacing: 0.04em;
    margin: 0 0 10px;
    color: rgba(244,236,216,0.4);
  }

  header p.sub {
    font-size: 0.95rem;
    color: rgba(244,236,216,0.6);
    max-width: 460px;
    margin: 0 auto;
    line-height: 1.5;
  }

  /* Language toggle - styled like stamped visa buttons */
  .lang-toggle {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin: 30px auto 0;
    flex-wrap: wrap;
  }

  /* Pronoun toggles */
  .pronoun-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin: 20px auto 0;
    flex-wrap: wrap;
  }

  .pronoun-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .pronoun-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(244,236,216,0.45);
  }

  .pronoun-pair {
    display: flex;
    border: 1px solid rgba(244,236,216,0.2);
    border-radius: 999px;
    overflow: hidden;
  }

  .pronoun-btn {
    background: transparent;
    border: none;
    color: rgba(244,236,216,0.55);
    padding: 6px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .pronoun-btn.active {
    background: var(--brass);
    color: var(--navy-deep);
    font-weight: 600;
  }

  .lang-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    border: 1.5px solid rgba(244,236,216,0.25);
    color: rgba(244,236,216,0.75);
    padding: 10px 18px;
    border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .lang-btn .dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.5;
  }

  .lang-btn[data-lang="it"] { color: #E8A79C; }
  .lang-btn[data-lang="fr"] { color: #9AC2E0; }
  .lang-btn[data-lang="es"] { color: #F0C874; }

  .lang-btn.active {
    background: rgba(244,236,216,0.08);
    border-color: currentColor;
  }
  .lang-btn.active .dot { opacity: 1; }

  /* Category chips */
  .categories {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    max-width: 900px;
    margin: 22px auto 0;
    padding: 0 20px;
  }

  .cat-chip {
    background: transparent;
    border: 1px solid var(--line);
    color: rgba(244,236,216,0.55);
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 0.78rem;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .cat-chip:hover { border-color: rgba(244,236,216,0.4); color: var(--cream); }
  .cat-chip.active {
    background: var(--brass);
    border-color: var(--brass);
    color: var(--navy-deep);
    font-weight: 600;
  }

  .status-line {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: rgba(244,236,216,0.4);
    margin-top: 20px;
    letter-spacing: 0.04em;
  }

  /* Card grid - fixed two columns on wider screens, one on narrow */
  .grid {
    max-width: 760px;
    margin: 30px auto 0;
    padding: 0 24px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
  }

  @media (max-width: 640px) {
    .grid {
      grid-template-columns: 1fr;
    }
  }

  .card-scene {
    perspective: 1200px;
    height: 200px;
  }

  .card {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(.4,.2,.2,1);
    cursor: pointer;
  }
  .card-scene.flipped .card {
    transform: rotateY(180deg);
  }

  .face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 10px;
    padding: 18px 16px 14px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-shadow: 0 6px 18px rgba(0,0,0,0.28);
  }

  .face-front {
    background: var(--cream);
    color: var(--ink);
    background-image: repeating-linear-gradient(
      0deg, transparent, transparent 24px, rgba(27,42,65,0.035) 25px
    );
  }

  /* punch hole + brass ring, luggage-tag signature */
  .face-front::before {
    content: '';
    position: absolute;
    top: 14px; left: 14px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--navy);
    box-shadow: 0 0 0 3px var(--cream-dim), inset 0 1px 2px rgba(0,0,0,0.4);
  }

  .tag-label {
    align-self: flex-end;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(27,42,65,0.4);
  }

  .phrase-en {
    font-family: 'Fraunces', serif;
    font-size: 1.05rem;
    line-height: 1.3;
    margin-top: 22px;
  }

  .flip-hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    color: rgba(27,42,65,0.35);
    letter-spacing: 0.05em;
  }

  .fav-star {
    position: absolute;
    bottom: 10px;
    right: 14px;
    font-size: 1.15rem;
    line-height: 1;
    color: rgba(27,42,65,0.22);
    cursor: pointer;
    user-select: none;
    transition: color 0.15s ease, transform 0.15s ease;
    z-index: 2;
  }

  .fav-star:hover {
    color: rgba(27,42,65,0.45);
  }

  .fav-star.active {
    color: var(--brass);
  }

  .fav-star.active:hover {
    transform: scale(1.1);
  }

  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    color: rgba(244,236,216,0.4);
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    padding: 50px 20px;
    line-height: 1.6;
  }

  /* back face - postmark style */
  .face-back {
    transform: rotateY(180deg);
    background: var(--navy-deep);
    color: var(--cream);
    border: 1.5px dashed rgba(244,236,216,0.22);
  }

  .stamp-mark {
    align-self: flex-end;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border: 1px solid currentColor;
    border-radius: 4px;
  }

  .phrase-target {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 1.12rem;
    line-height: 1.32;
    margin-top: 10px;
  }

  .back-en {
    font-family: 'Inter', sans-serif;
    font-size: 0.68rem;
    color: rgba(244,236,216,0.4);
  }

  footer {
    text-align: center;
    margin-top: 50px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: rgba(244,236,216,0.3);
    letter-spacing: 0.04em;
  }

  @media (prefers-reduced-motion: reduce) {
    .card { transition: none; }
  }
</style>
</head>
<body>

<header>
  <h1>Xa's Phrase Book vol. 1</h1>

  <div class="lang-toggle" id="langToggle">
    <button class="lang-btn active" data-lang="it"><span class="dot"></span>Italiano</button>
    <button class="lang-btn" data-lang="fr"><span class="dot"></span>Français</button>
    <button class="lang-btn" data-lang="es"><span class="dot"></span>Español</button>
  </div>

  <div class="pronoun-row">
    <div class="pronoun-group">
      <span class="pronoun-label">I am</span>
      <div class="pronoun-pair" id="selfGenderToggle">
        <button class="pronoun-btn active" data-gender="m">Male</button>
        <button class="pronoun-btn" data-gender="f">Female</button>
      </div>
    </div>
    <div class="pronoun-group">
      <span class="pronoun-label">I'm talking to</span>
      <div class="pronoun-pair" id="addresseeGenderToggle">
        <button class="pronoun-btn active" data-gender="m">Male</button>
        <button class="pronoun-btn" data-gender="f">Female</button>
      </div>
    </div>
  </div>
</header>

<div class="categories" id="categories"></div>
<div class="status-line" id="statusLine"></div>

<div class="grid" id="grid"></div>

<footer>Fold at the border. Flip to check yourself.</footer>

const LANG_NAMES = { it: "Italiano", fr: "Français", es: "Español" };
const LANG_COLORS = { it: "var(--it)", fr: "var(--fr)", es: "var(--es)" };

DATA.forEach((d, i) => { d.id = i; });

let currentLang = "it";
let currentCat = "All";
let selfGender = "m";       // gender used for "I am ___" self-referring adjectives
let addresseeGender = "m";  // gender used for phrases that agree with the person being addressed
let flippedScene = null;    // the single card-scene currently showing its back
let favorites = new Set();  // ids of starred cards

const categories = ["Favourites", ...new Set(DATA.map(d => d.cat)), "All"];

// Resolves a DATA field to a plain string. Fields can be a plain string,
// or an object like {m: "...", f: "..."} for gendered variants.
// `agreesWithSelf` phrases (marked via item.selfRef) use selfGender;
// everything else that's gendered falls back to addresseeGender.
function resolveField(item, field) {
  const val = item[field];
  if (typeof val === "string") return val;
  if (val && typeof val === "object") {
    const gender = item.selfRef === false ? addresseeGender : selfGender;
    return val[gender];
  }
  return "";
}

function renderCategories() {
  const el = document.getElementById("categories");
  el.innerHTML = "";
  categories.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "cat-chip" + (cat === currentCat ? " active" : "");
    btn.textContent = cat;
    btn.onclick = () => { currentCat = cat; renderCategories(); renderGrid(); };
    el.appendChild(btn);
  });
}

function renderGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  flippedScene = null;

  const filtered = currentCat === "All"
    ? DATA
    : currentCat === "Favourites"
      ? DATA.filter(d => favorites.has(d.id))
      : DATA.filter(d => d.cat === currentCat);

  document.getElementById("statusLine").textContent =
    `${filtered.length} card${filtered.length === 1 ? "" : "s"} · showing English ⇄ ${LANG_NAMES[currentLang]}`;

  if (filtered.length === 0 && currentCat === "Favourites") {
    const empty = document.createElement("div");
    empty.className = "empty-state";
    empty.textContent = "No favourites yet — tap the star on any card to pin it here.";
    grid.appendChild(empty);
    return;
  }

  filtered.forEach(item => {
    const scene = document.createElement("div");
    scene.className = "card-scene";

    const card = document.createElement("div");
    card.className = "card";

    const isFav = favorites.has(item.id);

    const front = document.createElement("div");
    front.className = "face face-front";
    front.innerHTML = `
      <div class="tag-label">${item.cat}</div>
      <div class="phrase-en">${item.en}</div>
      <div class="flip-hint">tap to flip →</div>
      <span class="fav-star${isFav ? " active" : ""}">★</span>
    `;

    const back = document.createElement("div");
    back.className = "face face-back";
    back.innerHTML = `
      <div class="stamp-mark" style="color:${LANG_COLORS[currentLang]}">${currentLang}</div>
      <div>
        <div class="phrase-target" style="color:${LANG_COLORS[currentLang]}">${resolveField(item, currentLang)}</div>
      </div>
      <div class="back-en">${item.en}</div>
    `;

    card.appendChild(front);
    card.appendChild(back);
    scene.appendChild(card);

    front.querySelector(".fav-star").addEventListener("click", (e) => {
      e.stopPropagation();
      if (favorites.has(item.id)) {
        favorites.delete(item.id);
      } else {
        favorites.add(item.id);
      }
      renderGrid();
    });

    scene.onclick = () => {
      const isFlipped = scene.classList.contains("flipped");
      if (flippedScene && flippedScene !== scene) {
        flippedScene.classList.remove("flipped");
      }
      scene.classList.toggle("flipped", !isFlipped);
      flippedScene = isFlipped ? null : scene;
    };

    grid.appendChild(scene);
  });
}

document.querySelectorAll(".lang-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".lang-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentLang = btn.dataset.lang;
    renderGrid();
  });
});

function wirePronounToggle(containerId, onChange) {
  const container = document.getElementById(containerId);
  container.querySelectorAll(".pronoun-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      container.querySelectorAll(".pronoun-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      onChange(btn.dataset.gender);
      renderGrid();
    });
  });
}

wirePronounToggle("selfGenderToggle", g => selfGender = g);
wirePronounToggle("addresseeGenderToggle", g => addresseeGender = g);

renderCategories();
renderGrid();
</script>
